target-version = "py312"
line-length = 120

exclude = [
    "alembic/versions/",
    "mobile/",
    "data/",
    "knowledge/",
    ".venv/",
    "__pycache__/",
]

[lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "S",   # bandit (security)
    "B",   # bugbear
]
ignore = [
    "E501",  # line too long — existing code exceeds 120 in many places
    "E402",  # module-level import not at top — required for env setup and lazy imports
    "E701",  # multiple statements on one line — used in compact dict/list patterns
    "E722",  # bare except — used in graceful fallbacks
    "E741",  # ambiguous variable name — false positives on short names (l, O)
    "S101",  # assert usage — needed in tests
    "S104",  # binding to 0.0.0.0 — intentional for Docker
    "S110",  # try/except/pass — used in graceful fallbacks
    "S112",  # try/except/continue — used in batch processing
    "S301",  # pickle — used for caching, not user input
    "S310",  # urllib.open — URLs are internal/validated
    "S324",  # hashlib — used for cache keys, not security
    "S603",  # subprocess calls — not used in web-facing code
    "S607",  # partial executable path — dev scripts only
    "S608",  # SQL injection — false positives on parameterized queries
    "B007",  # unused loop variable — used for readability in unpacking
    "B904",  # raise from — existing exception chains work correctly
    "F601",  # isinstance with tuple — existing code style
    "F821",  # undefined name — false positives on conditional imports
]

[lint.per-file-ignores]
"tests/*" = ["S"]          # disable all security checks in tests
"alembic/*" = ["E", "F"]   # auto-generated migration code
"scripts/*" = ["S"]        # one-off scripts
